// ─── DATABASE (Telegram CloudStorage + localStorage fallback) ───
// CloudStorage: async, 4096 chars per value, 1024 keys max
// localStorage: sync fallback for browser testing

const DB = {
  _cloud: isTelegram && TG.CloudStorage,

  save(key, data) {
    const val = JSON.stringify(data);
    // Split large values into chunks of 4000 chars (safety margin)
    if (val.length > 4000) {
      const chunks = Math.ceil(val.length / 4000);
      for (let i = 0; i < chunks; i++) {
        const chunkKey = 'lifeRPG_' + key + '_chunk_' + i;
        const chunkVal = val.slice(i * 4000, (i + 1) * 4000);
        if (this._cloud) {
          this._cloud.setItem(chunkKey, chunkVal, ()=>{});
        } else {
          try { localStorage.setItem(chunkKey, chunkVal); } catch(e) {}
        }
      }
      // Save chunk count
      const metaKey = 'lifeRPG_' + key + '_chunks';
      const metaVal = JSON.stringify(chunks);
      if (this._cloud) {
        this._cloud.setItem(metaKey, metaVal, ()=>{});
      } else {
        try { localStorage.setItem(metaKey, metaVal); } catch(e) {}
      }
    } else {
      if (this._cloud) {
        this._cloud.setItem('lifeRPG_' + key, val, ()=>{});
      } else {
        try { localStorage.setItem('lifeRPG_' + key, val); } catch(e) {}
      }
    }
  },

  // Async load — returns Promise
  loadAsync(key) {
    return new Promise((resolve) => {
      if (this._cloud) {
        // First check if chunked
        const metaKey = 'lifeRPG_' + key + '_chunks';
        this._cloud.getItem(metaKey, (err, metaVal) => {
          if (!err && metaVal) {
            const chunks = JSON.parse(metaVal);
            const chunkKeys = [];
            for (let i = 0; i < chunks; i++) chunkKeys.push('lifeRPG_' + key + '_chunk_' + i);
            this._cloud.getItems(chunkKeys, (err2, results) => {
              if (err2) { resolve(null); return; }
              let full = '';
              for (let i = 0; i < chunks; i++) full += (results[chunkKeys[i]] || '');
              try { resolve(JSON.parse(full)); } catch(e) { resolve(null); }
            });
          } else {
            // Not chunked, load directly
            this._cloud.getItem('lifeRPG_' + key, (err2, val) => {
              if (err2 || !val) { resolve(null); return; }
              try { resolve(JSON.parse(val)); } catch(e) { resolve(null); }
            });
          }
        });
      } else {
        // localStorage fallback (sync but wrapped in promise)
        try {
          // Check chunks first
          const metaVal = localStorage.getItem('lifeRPG_' + key + '_chunks');
          if (metaVal) {
            const chunks = JSON.parse(metaVal);
            let full = '';
            for (let i = 0; i < chunks; i++) full += (localStorage.getItem('lifeRPG_' + key + '_chunk_' + i) || '');
            resolve(JSON.parse(full));
          } else {
            const d = localStorage.getItem('lifeRPG_' + key);
            resolve(d ? JSON.parse(d) : null);
          }
        } catch(e) { resolve(null); }
      }
    });
  },

  clear() {
    if (this._cloud) {
      this._cloud.getKeys((err, keys) => {
        if (!err && keys && keys.length) {
          const toRemove = keys.filter(k => k.startsWith('lifeRPG_'));
          if (toRemove.length) this._cloud.removeItems(toRemove, ()=>{});
        }
      });
    }
    try {
      Object.keys(localStorage).filter(k => k.startsWith('lifeRPG_')).forEach(k => localStorage.removeItem(k));
    } catch(e) {}
  }
};

function getSkillLevel(sp) {
  let cur = SKILL_LEVELS[0];
  for (const l of SKILL_LEVELS) { if (sp >= l.spRequired) cur = l; else break; }
  const ni = SKILL_LEVELS.findIndex(l => l.level === cur.level) + 1;
  const next = ni < SKILL_LEVELS.length ? SKILL_LEVELS[ni] : null;
  return { ...cur, nextSp: next ? next.spRequired : null };
}

function getLevel(xp) {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.xp) cur = l; else break; }
  const ni = LEVELS.findIndex(l => l.level === cur.level) + 1;
  const next = ni < LEVELS.length ? LEVELS[ni] : {xp: cur.xp + 15000};
  return {...cur, nextXp: next.xp};
}

function calcStreak(history) {
  if (!history) return 0;
  const dates = Object.keys(history).sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  let checkDate = today();
  if (!history[checkDate] || history[checkDate].length === 0) {
    const d = new Date(); d.setDate(d.getDate() - 1);
    checkDate = d.toISOString().slice(0,10);
  }
  for (let i = 0; i < 500; i++) {
    if (history[checkDate] && history[checkDate].length > 0) {
      streak++;
      const d = new Date(checkDate); d.setDate(d.getDate() - 1);
      checkDate = d.toISOString().slice(0,10);
    } else break;
  }
  return streak;
}

function streakMultiplier(s) {
  if (s >= 100) return 4;
  if (s >= 60) return 3;
  if (s >= 30) return 2.5;
  if (s >= 21) return 2;
  if (s >= 14) return 1.8;
  if (s >= 7) return 1.5;
  if (s >= 3) return 1.2;
  return 1;
}

const Dashboard = ({char, setChar}) => {
  const [tab, setTab] = useState('quests');
  const [todayDone, setTodayDone] = useState(() => DB.load('today_'+today(), {}));
  const [reward, setReward] = useState(null);
  const [lvlUp, setLvlUp] = useState(false);
  const [toast, setToast] = useState(null);
  const prevLvl = useRef(char.level);
  const prevAchievements = useRef(char.achievements || []);

  useEffect(()=>{ DB.save('character', char); },[char]);
  useEffect(()=>{ DB.save('today_'+today(), todayDone); },[todayDone]);

  const lvl = getLevel(char.xp);
  const streak = calcStreak(char.history||{});
  const mult = streakMultiplier(streak);

  // Level up detection
  useEffect(()=>{
    if(lvl.level > prevLvl.current){
      setLvlUp(true);
      setTimeout(()=>setLvlUp(false),3000);
      prevLvl.current = lvl.level;
      setChar(c=>({...c,level:lvl.level,rank:lvl.rank,maxHp:100+lvl.level*5}));
    }
  },[lvl.level]);

  // Achievement checking
  useEffect(()=>{
    const unlocked = char.achievements || [];
    ACHIEVEMENTS.forEach(ach => {
      if (!unlocked.includes(ach.id) && ach.check(char, streak)) {
        // Unlock!
        const newUnlocked = [...unlocked, ach.id];
        setChar(c => ({
          ...c,
          achievements: newUnlocked,
          xp: c.xp + ach.xp,
          gold: c.gold + ach.gold,
        }));
        setToast({name: ach.name, icon: ach.icon, desc: ach.desc});
        setTimeout(()=>setToast(null), 3000);
      }
    });
  },[char.questsDone, streak, char.level]);

  // Class bonus: 1.5x XP for class-stat quests
  const classBonus = char.cls?.stat;

  const completeQuest = (quest, stat) => {
    const key = stat+':'+quest.name;
    if(todayDone[key]) return;

    let xpGain = Math.round(quest.xp * mult);
    // Class bonus
    if(stat === classBonus) xpGain = Math.round(xpGain * 1.5);
    const goldGain = quest.gold;
    const spGain = quest.sp || 5;

    setTodayDone(prev => ({...prev, [key]: {xp:xpGain, gold:goldGain, sp:spGain}}));
    setReward({xp:xpGain, gold:goldGain, isClass: stat===classBonus});
    setTimeout(()=>setReward(null),1800);

    setChar(c => {
      const d = today();
      const hist = {...(c.history||{})};
      if(!hist[d]) hist[d] = [];
      hist[d].push({quest:quest.name, stat, xp:xpGain, gold:goldGain, sp:spGain, time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})});

      // Stat growth: +0.1 per quest, +1 bonus per 10 quests in category
      const newStats = {...c.stats};
      newStats[stat] = Math.round((newStats[stat] + 0.1)*100)/100;
      const totalInCat = Object.values(hist).flat().filter(q=>q.stat===stat).length;
      if(totalInCat > 0 && totalInCat % 10 === 0) {
        newStats[stat] = Math.floor(newStats[stat]) + 1;
      }

      // Skill Points progression
      const skillPoints = {...(c.skillPoints||{})};
      skillPoints[stat] = (skillPoints[stat]||0) + spGain;

      return {
        ...c,
        xp: c.xp + xpGain,
        gold: c.gold + goldGain,
        hp: Math.min(c.hp + 2, c.maxHp),
        stats: newStats,
        questsDone: (c.questsDone||0) + 1,
        history: hist,
        lastActive: d,
        skillPoints,
      };
    });
  };

  const undoQuest = (quest, stat) => {
    const key = stat+':'+quest.name;
    const saved = todayDone[key];
    if(!saved) return;

    const xpLost = saved.xp || 0;
    const goldLost = saved.gold || 0;
    const spLost = saved.sp || 0;

    setTodayDone(prev => {
      const copy = {...prev};
      delete copy[key];
      return copy;
    });

    setChar(c => {
      const d = today();
      const hist = {...(c.history||{})};
      // Remove last matching entry from today's history
      if(hist[d]) {
        const idx = [...hist[d]].reverse().findIndex(e => e.quest === quest.name && e.stat === stat);
        if(idx >= 0) {
          const realIdx = hist[d].length - 1 - idx;
          hist[d] = [...hist[d].slice(0, realIdx), ...hist[d].slice(realIdx + 1)];
          if(hist[d].length === 0) delete hist[d];
        }
      }

      // Reverse stat growth
      const newStats = {...c.stats};
      newStats[stat] = Math.round((newStats[stat] - 0.1)*100)/100;

      // Reverse SP
      const skillPoints = {...(c.skillPoints||{})};
      skillPoints[stat] = Math.max(0, (skillPoints[stat]||0) - spLost);

      return {
        ...c,
        xp: Math.max(0, c.xp - xpLost),
        gold: Math.max(0, c.gold - goldLost),
        hp: Math.max(1, c.hp - 2),
        stats: newStats,
        questsDone: Math.max(0, (c.questsDone||1) - 1),
        history: hist,
        skillPoints,
      };
    });
  };

  const todayCount = Object.keys(todayDone).length;
  const totalQuests = Object.values(QUESTS).flat().length;
  const xpInLevel = char.xp - lvl.xp;
  const xpNeeded = lvl.nextXp - lvl.xp;

    {id:'stats',label:'📊 Статы'},

    {id:'achieve',label:'🏆 Ачивки'},
    {id:'history',label:'📅'},
    {id:'shop',label:'🛒'},
  ];

  return <div style={{minHeight:'100vh',paddingBottom:80}}>
    {lvlUp && <><div className="levelup-overlay"><div className="levelup-content">
      <div style={{fontSize:80,marginBottom:12}}>🎉</div>
      <div style={{fontSize:40,fontWeight:900,color:'#eab308',marginBottom:8}}>LEVEL UP!</div>
      <div style={{fontSize:24}}>Уровень {lvl.level}</div>
      <div style={{fontSize:18,color:'#9ca3af',marginTop:4}}>{lvl.rank}</div>
      <div style={{fontSize:14,color:'#4b5563',marginTop:8}}>+5 макс HP</div>
    </div></div><Confetti/></>}

    {reward && <div className="reward-popup">
      <span style={{color:'#eab308',fontWeight:700}}>+{reward.xp} XP</span>
      {mult > 1 && <span style={{color:'#f97316',fontSize:12}}>🔥×{mult}</span>}
      {reward.isClass && <span style={{color:'#a855f7',fontSize:12}}>⚡класс</span>}
      <span style={{color:'#a16207',fontWeight:700}}>+{reward.gold} 🪙</span>
    </div>}

    {toast && <div className="toast">
      <span style={{fontSize:24}}>{toast.icon}</span>
      <div>
        <div style={{fontWeight:700,color:'#a855f7',fontSize:14}}>🏆 Достижение!</div>
        <div style={{fontSize:13,color:'#d1d5db'}}>{toast.name}</div>
      </div>
    </div>}

    {/* Header */}
    <div className="header">
      <div style={{maxWidth:520,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:24}}>{char.cls.icon}</span>

              <span style={{fontWeight:700}}>{char.name}</span>
              <span style={{fontSize:12,color:'#6b7280',marginLeft:8}}>Lv.{lvl.level} {lvl.rank}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:10,fontSize:13,alignItems:'center'}}>
            <span style={{color:'#eab308',fontFamily:'monospace'}}>🪙{char.gold}</span>
            <span className="streak-badge" style={{background:streak>=7?'#92400e33':'#37415133',color:streak>=7?'#fbbf24':'#9ca3af'}}>
              🔥{streak} {mult>1&&`×${mult}`}
            </span>
            <span style={{fontSize:11,color:'#6b7280'}}>📅{daysPlayed||1}д</span>
          </div>
        </div>
        <div style={{display:'flex',gap:12}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#6b7280',marginBottom:3}}>

                <span style={{fontSize:24}}>{done?'✅':q.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,color:done?'#4b5563':'#fff',textDecoration:done?'line-through':'none'}}>{q.name}</div>
                  <div style={{fontSize:12,color:'#4b5563'}}>
                    +{displayXp} XP • +{q.gold} 🪙 • +{q.sp} SP
                    {mult>1&&<span style={{color:'#f97316'}}> 🔥×{mult}</span>}
                    {stat===classBonus&&<span style={{color:'#a855f7'}}> ⚡класс</span>}
                  </div>
                </div>
              </button>
              {done && <button className="btn" onClick={(e)=>{e.stopPropagation();undoQuest(q,stat);}} title="Отменить" style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',padding:'4px 10px',borderRadius:8,fontSize:11,color:'#f87171',background:'#7f1d1d33',border:'1px solid #7f1d1d66',zIndex:2}}>
                ↩ Отмена
              </button>}
            </div>;
          })}
        </div>)}
      </div>}

      {/* ═══ SKILLS TAB ═══ */}
      {tab==='skills' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>Деревья Навыков</h3>
        <p style={{fontSize:12,color:'#6b7280',marginBottom:16}}>Прокачивай навыки выполняя квесты. На уровне 3 и 5 открываются пассивки!</p>
        {Object.entries(SKILL_TREES).map(([stat,tree]) => {
          const sp = (char.skillPoints||{})[stat] || 0;
          const sl = getSkillLevel(sp);
          return <div key={stat} className="skill-card" style={{borderColor:tree.color+'44'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:24}}>{tree.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{tree.name} <span style={{fontSize:12,color:tree.color}}>({stat})</span></div>
                  <div style={{fontSize:12,color:'#6b7280'}}>Ур.{sl.level} {sl.rank} • {sp} SP</div>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:20,fontWeight:900,color:tree.color}}>{sl.level}</div>
                <div style={{fontSize:10,color:'#4b5563'}}>/ 5</div>
              </div>
            </div>
            {sl.nextSp && <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#4b5563',marginBottom:3}}>
                <span>До ур.{sl.level+1}</span><span>{sp}/{sl.nextSp} SP</span>
              </div>
              <Bar value={sp} max={sl.nextSp} color={tree.color} height={6}/>
            </div>}
            {tree.skills.map(skill => {
              const hasP3 = sl.level >= 3;
              const hasP5 = sl.level >= 5;
              return <div key={skill.id} style={{padding:'8px 0',borderTop:'1px solid #1f2937'}}>
                <div style={{fontWeight:500,fontSize:13,marginBottom:4}}>{skill.name}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:hasP3?tree.color+'22':'#1f2937',color:hasP3?tree.color:'#4b5563',border:`1px solid ${hasP3?tree.color+'44':'#374151'}`}}>
                    {hasP3?'✓':''} Ур.3: {skill.passiveLv3}
                  </span>
                  <span style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:hasP5?tree.color+'22':'#1f2937',color:hasP5?tree.color:'#4b5563',border:`1px solid ${hasP5?tree.color+'44':'#374151'}`}}>
                    {hasP5?'✓':'🔒'} Ур.5: {skill.passiveLv5}
                  </span>
                </div>
              </div>;
            })}
          </div>;
        })}
      </div>}

      {/* ═══ STATS TAB ═══ */}
      {tab==='stats' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:12}}>Характеристики</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
          {Object.entries(char.stats).map(([k,v]) => {
            const bonus = k===char.cls?.stat;
            const whole = Math.floor(v);
            const frac = v - whole;
            return <div key={k} className="stat-card" style={{borderColor:bonus?char.cls.color:'#374151',background:bonus?char.cls.color+'10':'#111827'}}>
              <div style={{fontSize:28,fontWeight:900,color:bonus?char.cls.color:'#e5e7eb'}}>{whole}</div>
              <div style={{fontSize:11,color:'#6b7280',fontWeight:600}}>{k}</div>
              {bonus && <div style={{fontSize:10,color:char.cls.color,marginTop:2}}>+3 класс</div>}
              <div style={{marginTop:6}}>
                <Bar value={frac*10} max={10} color={bonus?char.cls.color:'#6b7280'} height={4}/>
                <div style={{fontSize:9,color:'#4b5563',marginTop:2}}>+{(frac*10).toFixed(0)}/10 → +1</div>
              </div>
            </div>;
          })}
        </div>

        <h3 style={{fontSize:17,fontWeight:700,marginBottom:12}}>Прогрессия</h3>
        <div className="card" style={{marginBottom:12,background:'linear-gradient(135deg,#111827,#1a1a2e)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontWeight:700}}>Уровень {lvl.level}: {lvl.rank}</span>
            <span style={{fontSize:12,color:'#eab308'}}>→ Ур.{Math.min(lvl.level+1,20)}</span>
          </div>
          <Bar value={xpInLevel} max={xpNeeded} height={12}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#4b5563',marginTop:4}}>
            <span>{char.xp} XP всего</span>
            <span>{xpNeeded - xpInLevel} XP до следующего</span>
          </div>
        </div>

        <h3 style={{fontSize:17,fontWeight:700,marginBottom:12}}>Общая статистика</h3>
        {[
          {label:'Дней в игре',value:daysPlayed||1,icon:'📅'},
          {label:'Текущий стрик',value:`${streak} дней`,icon:'🔥'},
          {label:'Множитель XP',value:`×${mult}`,icon:'⚡'},
          {label:'Квестов выполнено',value:char.questsDone||0,icon:'⚔️'},
          {label:'Достижений',value:`${unlockedAch.length}/${ACHIEVEMENTS.length}`,icon:'🏆'},
          {label:'Боссов убито',value:BOSSES.filter(b=>(char.bossProgress||{})[b.name]>=b.total).length+'/'+BOSSES.length,icon:'🐲'},
          {label:'Всего Gold',value:char.gold + (char.goldSpent||0),icon:'🪙'},
        ].map((s,i) => <div key={i} className="card" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{color:'#9ca3af',fontSize:14}}>{s.icon} {s.label}</span>
          <span style={{fontWeight:700,fontFamily:'monospace',fontSize:15}}>{s.value}</span>
        </div>)}
      </div>}

      {/* ═══ BOSSES TAB ═══ */}
      {tab==='bosses' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:12}}>Активные Боссы</h3>
        {BOSSES.map(boss => {
          const prog = (char.bossProgress||{})[boss.name]||0;
          const dead = prog >= boss.total;
          const tierColors = {mini:'#f59e0b',weekly:'#ef4444',raid:'#a855f7'};
          const tierNames = {mini:'Мини-Босс',weekly:'Недельный',raid:'Рейд-Босс'};
          return <div key={boss.name} className="card" style={{marginBottom:10,borderColor:dead?'#166534':tierColors[boss.tier]+'33',background:dead?'#052e1622':'#111827'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{fontSize:32}}>{dead?'💀':boss.icon}</span>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontWeight:700,color:dead?'#4ade80':'#fff',textDecoration:dead?'line-through':'none'}}>{boss.name}</span>
                  <span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:tierColors[boss.tier]+'22',color:tierColors[boss.tier],border:`1px solid ${tierColors[boss.tier]}44`}}>{tierNames[boss.tier]}</span>
                </div>
                <div style={{fontSize:12,color:'#6b7280'}}>{boss.condition}</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <Bar value={prog} max={boss.total} color={dead?'#22c55e':tierColors[boss.tier]}/>
              <span style={{fontSize:12,color:'#6b7280',whiteSpace:'nowrap'}}>{prog}/{boss.total}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:'#4b5563'}}>+{boss.xp} XP, +{boss.gold} 🪙</span>
              {!dead && <button className="btn" onClick={()=>{
                const newProg = Math.min(prog+1,boss.total);
                   const isDead = newProg>=boss.total;
                setChar(c=>({
                  ...c,
                  bossProgress:{...(c.bossProgress||{}), [boss.name]:newProg},
                  ...(isDead?{xp:c.xp+boss.xp,gold:c.gold+boss.gold}:{}),
                }));
                if(isDead){setReward({xp:boss.xp,gold:boss.gold});setTimeout(()=>setReward(null),2000);}
              }} style={{fontSize:12,padding:'6px 12px',borderRadius:8,background:tierColors[boss.tier]+'22',color:tierColors[boss.tier],border:`1px solid ${tierColors[boss.tier]}55`}}>
                +1 Прогресс
              </button>}
            </div>
          </div>;
        })}
      </div>}

      {/* ═══ ACHIEVEMENTS TAB ═══ */}
      {tab==='achieve' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>Достижения</h3>
        <p style={{fontSize:12,color:'#6b7280',marginBottom:16}}>{unlockedAch.length}/{ACHIEVEMENTS.length} разблокировано</p>
        <Bar value={unlockedAch.length} max={ACHIEVEMENTS.length} color="#a855f7" height={8}/>
        <div style={{marginTop:16}}>
          {['bronze','silver','gold','legendary'].map(tier => {
            const tierAch = ACHIEVEMENTS.filter(a=>a.tier===tier);
            const tierNames = {bronze:'🥉 Бронза',silver:'🥈 Серебро',gold:'🥇 Золото',legendary:'🏆 Легендарные'};
            const tierColors = {bronze:'#cd7f32',silver:'#c0c0c0',gold:'#ffd700',legendary:'#a855f7'};
            return <div key={tier} style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:tierColors[tier],marginBottom:8}}>{tierNames[tier]}</div>
              {tierAch.map(ach => {
                const unlocked = unlockedAch.includes(ach.id);
                return <div key={ach.id} className={`achievement-card ${unlocked?'unlocked':'locked'}`}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:28}}>{unlocked ? ach.icon : '🔒'}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:unlocked?'#e5e7eb':'#4b5563'}}>{ach.name}</div>
                      <div style={{fontSize:12,color:unlocked?'#9ca3af':'#374151'}}>{ach.desc}</div>
                    </div>
                    <div style={{textAlign:'right',fontSize:11,color:unlocked?'#eab308':'#374151'}}>
                      {ach.xp>0&&<div>+{ach.xp} XP</div>}
                      {ach.gold>0&&<div>+{ach.gold} 🪙</div>}
                    </div>
                  </div>
                </div>;
              })}
            </div>;
          })}
        </div>
      </div>}

      {/* ═══ HISTORY TAB ═══ */}
      {tab==='history' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>История прогресса</h3>
        <p style={{fontSize:13,color:'#6b7280',marginBottom:16}}>Все действия записываются автоматически</p>
        {char.history && Object.keys(char.history).length > 0 ?
          Object.entries(char.history).sort((a,b)=>b[0].localeCompare(a[0])).map(([date, entries]) => {
            const d = new Date(date);
            const dayName = d.toLocaleDateString('ru',{weekday:'short',day:'numeric',month:'short'});
            const totalXp = entries.reduce((s,e)=>s+e.xp,0);
            const totalGold = entries.reduce((s,e)=>s+e.gold,0);
            return <div key={date} style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:14,fontWeight:700,color:date===today()?'#eab308':'#9ca3af'}}>
                  {date===today()?'📍 Сегодня':dayName}
                </span>
                <div style={{display:'flex',gap:10,fontSize:12}}>
                  <span style={{color:'#eab308'}}>+{totalXp} XP</span>
                  <span style={{color:'#a16207'}}>+{totalGold} 🪙</span>
                  <span style={{color:'#6b7280'}}>{entries.length} кв.</span>
                </div>
              </div>
              {entries.map((e,i) => <div key={i} className="history-row">
                <span style={{color:'#4b5563',fontFamily:'monospace',fontSize:11}}>{e.time}</span>
                <span style={{flex:1,color:'#d1d5db'}}>{e.quest}</span>
                <span style={{fontSize:11,color:'#4b5563',background:'#1f2937',padding:'2px 6px',borderRadius:4}}>{e.stat}</span>
                <span style={{fontSize:12,color:'#eab308',fontFamily:'monospace'}}>+{e.xp}</span>
              </div>)}
            </div>;
          })
        : <div style={{textAlign:'center',padding:40,color:'#4b5563'}}>
            <div style={{fontSize:48,marginBottom:8}}>📜</div>
            <p>Пока пусто. Выполни первый квест!</p>
          </div>
        }
      </div>}

      {/* ═══ SHOP TAB ═══ */}
      {tab==='shop' && <div className="fade-in">
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>Магазин Наград</h3>
        <p style={{fontSize:13,color:'#6b7280',marginBottom:16}}>Потрать Gold на реальные награды для себя!</p>
        {SHOP.map(item => {
          const ok = char.gold >= item.price;
          return <button key={item.name} className="quest-btn" onClick={()=>{
            if(!ok) return;
            setChar(c=>({...c, gold:c.gold-item.price, goldSpent:(c.goldSpent||0)+item.price}));
            setReward({xp:0, gold:-item.price});
            setTimeout(()=>setReward(null),1500);
          }} style={{opacity:ok?1:.35,cursor:ok?'pointer':'not-allowed'}}>
            <span style={{fontSize:24}}>{item.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:500}}>{item.name}</div>
            </div>
            <span style={{fontFamily:'monospace',fontSize:14,color:ok?'#eab308':'#4b5563'}}>{item.price} 🪙</span>
          </button>;
        })}
      </div>}
    </div>
  </div>;
};

// ─── APP ───
function App() {
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState('welcome');
  const [name, setName] = useState(tgUserName || '');
  const [selClass, setSelClass] = useState(null);
  const [char, setChar] = useState(null);
  const [savedChar, setSavedChar] = useState(null);

  // Async load on mount
  useEffect(() => {
    Promise.all([
      DB.loadAsync('character'),
      DB.loadAsync('today_' + today()),
    ]).then(([charData, todayData]) => {
      if (charData) {
        setSavedChar(charData);
        setChar(charData);
        if (tgUserName && charData.name !== tgUserName) {
          charData.name = tgUserName;
        }
      }
      setLoading(false);
    });
  }, []);

  const startGame = () => {
    const heroName = name.trim() || tgUserName || 'Герой';
    const stats = {STR:5,INT:5,DEX:5,CHA:5,WIS:5,CON:5};
    stats[selClass.stat] += 3;
    const c = {
      name: heroName, cls:selClass, level:1, rank:'Новичок',
      xp:0, hp:100, maxHp:105, gold:0,
      stats, questsDone:0, bossProgress:{},
      history:{}, lastActive:today(), goldSpent:0,
      skillPoints:{STR:0,INT:0,DEX:0,CHA:0,WIS:0,CON:0},
      achievements:[],
    };
    setChar(c);
    DB.save('character', c);
    setScreen('dashboard');
  };

  const continueGame = () => {
    if(char && char.lastActive && char.lastActive !== today()) {
      const missed = daysBetween(char.lastActive, today()) - 1;
      if(missed > 0) {
        const penalty = Math.min(missed * 5, 50);
        setChar(c => {
          const updated = {...c, hp: Math.max(c.hp - penalty, 1), lastActive: today()};
          DB.save('character', updated);
          return updated;
        });
      }
    }
    setScreen('dashboard');
  };

  if (loading) {
    return <div style={{minHeight:'100vh'}}>
      <Particles/>
      <div className="loading-screen" style={{position:'relative',zIndex:10}}>
        <div style={{fontSize:60}}>⚔️</div>
        <div className="spinner"/>
        <div style={{color:'#6b7280',fontSize:14}}>Загрузка данных...</div>
      </div>
    </div>;
  }

  return <div style={{minHeight:'100vh'}}>
    <Particles/>
    <div style={{position:'relative',zIndex:10}}>
      {screen==='welcome' && <WelcomeScreen hasSave={!!savedChar} onNext={()=> savedChar ? continueGame() : setScreen(tgUserName ? 'class' : 'name')}/>}
      {screen==='name' && <NameScreen name={name} setName={setName} onNext={()=>setScreen('class')}/>}
      {screen==='class' && <ClassScreen sel={selClass} setSel={setSelClass} onNext={()=>setScreen('ready')} onBack={()=>setScreen(tgUserName ? 'welcome' : 'name')}/>}
      {screen==='ready' && <ReadyScreen name={name || tgUserName || 'Герой'} cls={selClass} onStart={startGame}/>}
      {screen==='dashboard' && char && <Dashboard char={char} setChar={setChar}/>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
